<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Detalhes do clássico brasileiro — história, ficha técnica e galeria de fotos.">
    <title>Detalhes — Clássicos Brasileiros</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        @font-face {
            font-family: 'Dog Days Brush';
            src: url('./fonts/dog-days-brush.otf') format('opentype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --bg-color: #120e0c;
            --text-color: #f3ede2;
            --text-muted: #bdae9c;
            --card-bg: #1c1612;
            --card-border: #33261c;
            --header-bg: #0b0807;
            --btn-bg: rgba(217,160,91,0.08);
            --btn-hover: rgba(217,160,91,0.16);
            --focus-ring: #d9a05b;
            --accent-ochre: #d9a05b;
            --badge-bg: #3e5a4a;
            --badge-text: #ebdcc3;
            --inset-border: rgba(217,160,91,0.12);
            --transition-speed: 0.3s;
        }

        body.light-mode {
            --bg-color: #FAFAF5;
            --text-color: #333330;
            --text-muted: #666660;
            --card-bg: #fdfdfb;
            --card-border: #e2e2d9;
            --header-bg: #f3f3eb;
            --btn-bg: rgba(51,51,48,0.06);
            --btn-hover: rgba(51,51,48,0.12);
            --focus-ring: #c78d38;
            --accent-ochre: #c78d38;
            --badge-bg: #2a473a;
            --badge-text: #FAFAF5;
            --inset-border: rgba(51,51,48,0.08);
        }

        /* Temas retrô — herdados do site principal */
        body.theme-70s  { --focus-ring:#9d7e63; --accent-ochre:#9d7e63; --bg-color:#2d241f; --text-color:#e8ddd4; --card-bg:#3a2f28; --card-border:#5c4a3d; --header-bg:#1a1510; --badge-bg:#5d6b55; --badge-text:#e8ddd4; --inset-border:rgba(120,95,75,0.15); }
        body.theme-80s  { --focus-ring:#ff007f; --accent-ochre:#00ffff; --bg-color:#0f051d; --text-color:#f0e6ff; --card-bg:#190b2e; --card-border:#3a1c66; --header-bg:#080210; --badge-bg:#ff007f; --badge-text:#fff; --inset-border:rgba(0,255,255,0.15); }
        body.theme-90s  { --focus-ring:#e6a86c; --accent-ochre:#5f9ea0; --bg-color:#14191a; --text-color:#e6ecec; --card-bg:#1d2526; --card-border:#344243; --header-bg:#0d1112; --badge-bg:#5f9ea0; --badge-text:#14191a; --inset-border:rgba(95,158,160,0.15); }
        body.theme-2010s { --focus-ring:#7a94b8; --accent-ochre:#7a94b8; --bg-color:#1a1a24; --text-color:#e0e0ea; --card-bg:#232536; --card-border:#3e4556; --header-bg:#0f0f15; --badge-bg:#6b8a6b; --badge-text:#1a1a24; --inset-border:rgba(80,100,140,0.12); }
        body.theme-futurista { --focus-ring:#00ffaa; --accent-ochre:#ff3e3e; --bg-color:#06080d; --text-color:#dcf8ff; --card-bg:#0d121f; --card-border:#1a263d; --header-bg:#030407; --badge-bg:#00ffaa; --badge-text:#06080d; --inset-border:rgba(0,240,255,0.15); }
        body.theme-tropical  { --focus-ring:#ffd700; --accent-ochre:#ffd700; --bg-color:#0a1c12; --text-color:#f0faf4; --card-bg:#102a1c; --card-border:#1c442e; --header-bg:#050e09; --badge-bg:#ffd700; --badge-text:#0a1c12; --inset-border:rgba(255,215,0,0.12); }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color var(--transition-speed), color var(--transition-speed);
            min-height: 100vh;
        }

        /* HEADER */
        .main-header {
            position: sticky; top: 0;
            background-color: var(--header-bg);
            border-bottom: 1px solid var(--card-border);
            padding: 14px 24px;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .header-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--btn-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            color: var(--text-color);
            padding: 9px 16px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: background var(--transition-speed), border-color var(--transition-speed);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .back-btn:hover {
            background: var(--btn-hover);
            border-color: var(--focus-ring);
            color: var(--focus-ring);
        }

        .back-btn svg {
            width: 16px; height: 16px;
            stroke: currentColor; fill: none;
            stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
        }

        #car-title {
            margin: 0;
            font-family: 'Dog Days Brush', 'Playfair Display', serif;
            font-size: 2rem;
            line-height: 1.1;
            flex: 1;
        }

        /* MAIN CONTENT */
        .page-container {
            max-width: 1100px;
            margin: 36px auto 80px auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        /* IMAGEM PRINCIPAL — sem compressão, qualidade total */
        .main-image-wrap {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid var(--card-border);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
            position: relative;
            background: var(--header-bg);
        }

        .main-image-wrap::after {
            content: '';
            position: absolute;
            inset: 10px;
            border: 1px solid var(--inset-border);
            border-radius: 10px;
            pointer-events: none;
            z-index: 2;
        }

        #main-img {
            width: 100%;
            height: auto;
            max-height: 600px;
            object-fit: contain;
            display: block;
        }

        /* GALERIA DE MINIATURAS — só aparece se tiver mais de 1 foto */
        .gallery {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .gallery-thumb {
            width: 110px;
            height: 75px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid var(--card-border);
            transition: border-color 0.2s, transform 0.2s;
        }

        .gallery-thumb:hover, .gallery-thumb.active {
            border-color: var(--focus-ring);
            transform: scale(1.04);
        }

        /* INFO + FICHA */
        .info-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 32px;
            position: relative;
        }

        .info-card::after {
            content: '';
            position: absolute;
            inset: 8px;
            border: 1px solid var(--inset-border);
            border-radius: 12px;
            pointer-events: none;
        }

        .info-card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: var(--accent-ochre);
            margin: 0 0 16px 0;
            padding-bottom: 10px;
            border-bottom: 1px dashed var(--card-border);
        }

        .info-card p {
            line-height: 1.75;
            font-size: 1rem;
            color: var(--text-color);
            opacity: 0.9;
            margin: 0;
        }

        /* FICHA TÉCNICA */
        .specs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .spec-item {
            background: var(--bg-color);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 16px 20px;
            border-left: 4px solid var(--accent-ochre);
        }

        .spec-label {
            display: block;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--accent-ochre);
            margin-bottom: 6px;
        }

        .spec-value {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-color);
        }

        /* ANO BADGE */
        .year-badge {
            display: inline-block;
            background: var(--badge-bg);
            color: var(--badge-text);
            font-size: 0.75rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 4px;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            border: 1px dashed rgba(255,255,255,0.2);
            margin-bottom: 20px;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 24px;
            background: var(--header-bg);
            border-top: 1px solid var(--card-border);
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* RESPONSIVO */
        @media (max-width: 640px) {
            .header-inner { gap: 10px; }
            #car-title { font-size: 1.4rem; }
            .back-btn span { display: none; }
            .back-btn { padding: 9px 12px; }
            .page-container { padding: 0 12px; margin: 20px auto 60px; gap: 20px; }
            .info-card { padding: 20px 16px; }
            #main-img { max-height: 280px; }
            .specs-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="header-inner">
            <a href="carros antigos.html" class="back-btn" id="backBtn">
                <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
                <span>Voltar ao Catálogo</span>
            </a>
            <h1 id="car-title">Carregando...</h1>
        </div>
    </header>

    <div class="page-container">
        <div class="main-image-wrap">
            <img id="main-img" src="" alt="Foto principal do veículo">
        </div>

        <div id="gallery-container" style="display:none;">
            <div id="gallery" class="gallery"></div>
        </div>

        <div class="info-card" id="info-historia">
            <h2>História e Detalhes</h2>
            <span id="year-badge" class="year-badge"></span>
            <p id="car-desc">Carregando...</p>
        </div>

        <div class="info-card">
            <h2>Ficha Técnica</h2>
            <div class="specs-grid" id="specs-grid"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Clássicos Brasileiros. Todos os direitos reservados.</p>
    </footer>

    <script>
        // Aplicar tema e modo salvos
        (function() {
            const tema = localStorage.getItem('vintageTema') || '';
            const modo = localStorage.getItem('vintageModo') || 'dark';
            if (tema && tema !== 'classico') document.body.classList.add('theme-' + tema);
            if (modo === 'light') document.body.classList.add('light-mode');
        })();
    </script>

    <!-- Banco de dados legado (carros básicos) -->
    <script src="js/dados.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const carId = params.get('carro');

            if (!carId) { window.location.href = 'carros antigos.html'; return; }

            // Tenta primeiro carrosDados (banco embutido completo), depois carsData (legado)
            let carro = null;
            let isNovo = false;

            if (typeof carrosDados !== 'undefined' && carrosDados[carId]) {
                carro = carrosDados[carId];
                isNovo = true;
            } else if (typeof carsData !== 'undefined') {
                carro = carsData.find(c => c.id === carId);
            }

            if (!carro) {
                alert('Veículo não encontrado.');
                window.location.href = 'carros antigos.html';
                return;
            }

            // Normalizar campos entre os dois formatos
            const nome     = isNovo ? carro.nome       : carro.name;
            const ano      = isNovo ? carro.ano        : carro.year;
            const descLong = isNovo ? carro.desc        : (carro.historicalDesc || carro.shortDesc);
            const fotos    = isNovo ? carro.fotos       : (carro.fotos || [carro.image]);
            const specs    = isNovo ? carro.tecnicos    : carro.technicalSpecs;
            const imgPrincipal = fotos && fotos.length > 0 ? fotos[0] : '';

            // Normalizar caminho (./imagens/ ou imagens/)
            function fixPath(p) {
                if (!p) return '';
                return p.startsWith('./') ? p : './' + p;
            }

            // Título
            document.title = nome + ' — Clássicos Brasileiros';
            document.getElementById('car-title').textContent = nome;

            // Imagem principal
            const mainImg = document.getElementById('main-img');
            mainImg.src = fixPath(imgPrincipal);
            mainImg.alt = nome;

            // Galeria — só mostra se tiver mais de 1 foto única
            const fotosUnicas = [...new Set(fotos)];
            if (fotosUnicas.length > 1) {
                const galleryEl = document.getElementById('gallery');
                const gcEl = document.getElementById('gallery-container');
                gcEl.style.display = 'block';
                fotosUnicas.forEach((foto, i) => {
                    const img = document.createElement('img');
                    img.src = fixPath(foto);
                    img.alt = nome + ' foto ' + (i + 1);
                    img.className = 'gallery-thumb' + (i === 0 ? ' active' : '');
                    img.addEventListener('click', () => {
                        mainImg.src = fixPath(foto);
                        galleryEl.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
                        img.classList.add('active');
                    });
                    galleryEl.appendChild(img);
                });
            }

            // Ano badge + descrição
            document.getElementById('year-badge').textContent = ano;
            document.getElementById('car-desc').textContent = descLong;

            // Ficha técnica
            const specMap = {
                'Motor':            specs?.motor   || (isNovo ? specs?.motor   : carro.technicalSpecs?.motor),
                'Potência':         specs?.potencia,
                'Câmbio':           specs?.cambio,
                'Anos de Fabricação': ano
            };
            const grid = document.getElementById('specs-grid');
            Object.entries(specMap).forEach(([label, value]) => {
                if (!value) return;
                const div = document.createElement('div');
                div.className = 'spec-item';
                div.innerHTML = `<span class="spec-label">${label}</span><span class="spec-value">${value}</span>`;
                grid.appendChild(div);
            });
        });
    </script>
</body>
</html>
